# Shared defaults — override per-host in host_vars/<hostname>/vars.yml
php_version: '8.4'
node_version: '22'
postgresql_version: '16'

# Application (shared)
app_name: 'sna'
app_user: 'forge'
app_path: '/home/forge/{{ app_domain }}'
repo_url: 'git@github.com:yaayes/sna-website.git'

# PostgreSQL (shared)
db_user: 'forge'

# Redis (shared)
redis_bind_addresses:
  - '127.0.0.1'
  - '::1'
redis_port: 6379
redis_protected_mode: 'yes'
redis_databases: 16
redis_maxmemory: '256mb'
redis_maxmemory_policy: 'allkeys-lru'

# PHP-FPM socket
php_fpm_socket: '/var/run/php/php{{ php_version }}-fpm.sock'
