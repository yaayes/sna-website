# Shared defaults — override per-host in host_vars/<hostname>/vars.yml
php_version: '8.4'
node_version: '22'
postgresql_version: '16'

# Application (shared)
app_name: 'sna'
app_user: 'forge'
app_path: '/home/forge/{{ app_domain }}'
repo_url: 'git@github.com:yaayes/sna-website.git'

# PostgreSQL (shared)
db_user: 'forge'

# PHP-FPM socket
php_fpm_socket: '/var/run/php/php{{ php_version }}-fpm.sock'
